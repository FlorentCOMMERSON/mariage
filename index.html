<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torypo - Notre Mariage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Barre de Navigation -->
    <header>
        <nav class="navbar">
            <a href="index.html" class="nav-link active">Accueil</a>
            <a href="rsvp.html" class="nav-link">Votre réponse</a>
            <a href="faq.html" class="nav-link">FAQ</a>
        </nav>
    </header>
    <div class="icon">
        <img src="images/meeples.png" alt="Meeple" style="width: 5vw; opacity: 0.8;">
    </div>

    <div class="icon2">
        <img src="images/leaf1.png" alt="une feuille" style="width: 4vw; opacity: 0.8;">
    </div>

    <div class="icon3">
        <img src="images/leaf2.png" alt="une feuille" style="width: 4vw; opacity: 0.8;">
    </div>

    <div class="icon4">
        <img src="images/leaf3.png" alt="une feuille" style="width: 4vw; opacity: 0.8;">
    </div>
    <!-- Section Principale  -->
    <main class="hero-section">
        <!-- Conteneur pour le motif de dalles -->
        <div class="tiles-background"></div>

        <div class="hero-content">
            <h1 class="names">Victoria & Florent</h1>
            <div class="separator"></div>
            <p class="subtitle">Notre aventure commence</p>

            <div class="cta-container">
                <a href="reponse.html" class="btn btn-primary">
                    <i class="fa-solid fa-leaf"></i> Répondre à l'invitation
                </a>
                <a href="infos.html" class="btn btn-secondary">
                    <i class="fa-solid fa-magnifying-glass"></i> Découvrir
                </a>
            </div>
        </div>
    </main>

    <!-- Section Informations Clés -->
    <section class="info-grid-section">
        <div class="info-container">

            <!-- Colonne 1 : La Date -->
            <div class="info-card">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-dice-d6"></i>
                </div>
                <h2>La Date</h2>
                <p>10 Octobre 2026</p>
            </div>

            <!-- Colonne 2 : Le Lieu -->
            <div class="info-card">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-chess-knight"></i>
                </div>
                <h2>Le Lieu</h2>
                <p>Château de Fortis</p>
            </div>

            <!-- Colonne 3 : Le Programme -->
            <div class="info-card">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-book"></i>
                </div>
                <h2>Réponse avant le</h2>
                <p>31 Août 2026</p>
            </div>

        </div>
    </section>

    <!-- Pied de page -->
    <footer>
        <div class="footer-content">
            <p>Victoria & Florent — 2026</p>
        </div>
    </footer>

<script>
    // --- PARTIE 1 : Gérer l'arrivée douce (Fade In) ---
    // Dès que le contenu HTML est chargé, on active la transition
    window.addEventListener('DOMContentLoaded', () => {
        // Un très léger délai (50ms) assure que le navigateur a bien appliqué opacity: 0 initialement
        setTimeout(() => {
            document.body.classList.add('loaded');
        }, 50);
    });

    // --- PARTIE 2 : Gérer le départ doux (Fade Out) ---
    // On écoute tous les clics sur la page
    document.addEventListener('click', (e) => {
        // On cherche si l'élément cliqué est un lien <a> ou est à l'intérieur d'un lien <a>
        const link = e.target.closest('a');

        // Si ce n'est pas un lien, ou s'il n'a pas d'URL, on ne fait rien
        if (!link || !link.href) return;

        // Configuration pour valider que c'est un lien interne vers notre site (.html)
        const isInternal = link.hostname === window.location.hostname;
        const isHtmlPage = link.pathname.endsWith('.html') || link.pathname === '/'; // Gère aussi la racine '/'
        const isNotSamePage = link.hash === ''; // Ignore les liens d'ancrage (#section)

        if (isInternal && isHtmlPage && isNotSamePage) {
            e.preventDefault(); // On bloque la redirection immédiate
            const targetUrl = link.href;

            // On ajoute la classe qui fait disparaître la page
            document.body.classList.add('fade-out');

            // On attend la fin de l'animation de sortie (coordonnée avec le CSS : 0.5s)
            setTimeout(() => {
                window.location.href = targetUrl; // Redirection vers la nouvelle page
            }, 500); // 500ms = 0.5s
        }
    });
</script>
</body>

</html>
