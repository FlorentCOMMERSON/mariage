<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torypo - Notre Mariage - reponse</title>
    <link rel="icon" type="png" href="images/chicken.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Barre de Navigation -->
    <header>
        <nav class="navbar">
            <a href="index.html" class="nav-link ">Accueil</a>
            <a href="rsvp.html" class="nav-link active">Votre réponse</a>
            <a href="faq.html" class="nav-link">FAQ</a>
        </nav>
    </header>
    <div class="icon">
        <img src="images/meeples.png" alt="Meeple" style="width: 5vw; opacity: 0.8;">
    </div>
    <div class="icon2">
        <img src="images/leaf1.png" alt="une feuille" style="width: 4vw; opacity: 0.8;">
    </div>

    <div class="icon3">
        <img src="images/leaf2.png" alt="une feuille" style="width: 4vw; opacity: 0.8;">
    </div>

    <div class="icon4">
        <img src="images/leaf3.png" alt="une feuille" style="width: 4vw; opacity: 0.8;">
    </div>

    <!-- Section Principale RSVP -->
    <main class="rsvp-section">
        <div class="rsvp-book-container">

            <!-- Le livre ouvert en arrière-plan -->
            <img src="images/livre.png" alt="Livre d'aventure" class="book-background">

            <!-- Le formulaire superposé sur les pages du livre -->
            <div class="book-content-overlay">

                <h1 class="rsvp-title">Confirmez votre présence</h1>
                <p class="rsvp-subtitle">Écrivez la suite de l'histoire avec nous...</p>

                <!-- Formulaire connecté à FormSubmit -->
                <form action="https://formsubmit.co/mariage.torypo@gmail.com" method="POST" class="rsvp-wedding-form">

                    <!-- Configuration FormSubmit (Pas de captcha pour vos invités + page de retour) -->
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_next"
                        value="https://FlorentCOMMERSON.github.io/mariage/index.html?rsvp=success">
                    <input type="hidden" name="_subject" value="✨ Nouvelle réponse Mariage !">

                    <!-- 1. Nom & Prénom du premier invité -->
    <div class="form-group">
        <label for="guest-name">Nom et Prénom</label>
        <input type="text" id="guest-name" name="Nom Prénom Principal" placeholder="Ex: Marc Assin" required>
    </div>

    <!-- 2. Présence ("Serez-vous des nôtres ?") -->
    <div class="form-group">
        <label>Serez-vous des nôtres ?</label>
        <div class="radio-group">
            <label class="radio-label">
                <input type="radio" name="Presence" value="Oui" required checked>
                <span>Oui, avec joie !</span>
            </label>
            <label class="radio-label">
                <input type="radio" name="Presence" value="Non">
                <span>Non, à mon grand regret</span>
            </label>
        </div>
    </div>

    <!-- 3. Nombre d'adultes (Seul ou à 2) -->
    <div class="form-group" id="number-of-guests-group">
        <label>Venez-vous accompagné(e) ?</label>
        <div class="radio-group">
            <label class="radio-label">
                <input type="radio" name="Nombre d'adultes" value="1" id="guest-single" checked>
                <span>Je viens seul(e)</span>
            </label>
            <label class="radio-label">
                <input type="radio" name="Nombre d'adultes" value="2" id="guest-couple">
                <span>Nous venons à 2</span>
            </label>
        </div>
    </div>

    <!-- 4. Champ dynamique pour le 2ème invité (Caché par défaut) -->
    <div class="form-group" id="second-guest-group" style="display: none;">
        <label for="second-guest-name">Nom et Prénom de la 2ème personne</label>
        <input type="text" id="second-guest-name" name="Nom Prénom 2eme Invité" placeholder="Ex: Léa Bricot">
    </div>

    <!-- 5. Nombre d'enfants -->
    <div class="form-group">
        <label for="children-count">Combien de lutins (enfants) vous accompagnent ?</label>
        <select id="children-count" name="Nombre d'enfants">
            <option value="0" selected>Aucun</option>
            <option value="1">1 lutin</option>
            <option value="2">2 lutins</option>
            <option value="3">3 lutins</option>
        </select>
    </div>

    <!-- 6. Étapes de la journée (Cases à cocher multiples) -->
    <div class="form-group checkboxes-presence">
        <label>À quelles étapes de la journée assistez-vous ?</label>
        <p class="form-help">Cochez toutes les cases qui vous concernent :</p>
        
        <div class="checkbox-list">
            <label class="checkbox-label">
                <input type="checkbox" name="Assiste à : Mairie" value="Oui">
                <span>Mairie</span>
            </label>
              <label class="checkbox-label">
                <input type="checkbox" name="Assiste à : Cérémonie" value="Oui">
                <span>Cérémonie</span>
            </label>
            <label class="checkbox-label">
                <input type="checkbox" name="Assiste à : Vin d'honneur" value="Oui">
                <span>Vin d'honneur</span>
            </label>
            <label class="checkbox-label">
                <input type="checkbox" name="Assiste à : Repas et soirée" value="Oui">
                <span>Repas et soirée</span>
            </label>
        </div>
    </div>

    <!-- 6.5. Passer la nuit -->
    <div class="form-group" id="night">
        <label>Souhaitez-vous dormir sur place ?</label>
        <div class="radio-group">
            <label class="radio-label">
                <input type="radio" name="Passer la nuit" value="1" id="night-yes" checked>
                <span>Oui</span>
            </label>
            <label class="radio-label">
                <input type="radio" name="Passer la nuit" value="0" id="night-no">
                <span>Non</span>
            </label>
        </div>
    </div>

    <!-- 7. Adresse email de contact -->
    <div class="form-group">
        <label for="guest-email">Adresse mail de contact</label>
        <input type="email" id="guest-email" name="Email de contact" placeholder="Ex: anna.lyse@exemple.com" required>
    </div>

    <!-- 8. Allergies, régimes ou petit mot -->
    <div class="form-group">
        <label for="guest-notes">Allergies, régimes spécifiques ou un petit mot ?</label>
        <textarea id="guest-notes" name="Allergies, Régimes ou Message" rows="4" placeholder="Indiquez-nous ici vos contraintes alimentaires (végétarien, sans gluten, allergies...) ou votre petit message !"></textarea>
    </div>

    <!-- Bouton de soumission -->
    <div class="form-submit-container">
        <button type="submit" class="btn btn-primary">Envoyer notre réponse</button>
    </div>

</form>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 1. Sélection des boutons radio de présence
        const presenceRadios = document.querySelectorAll('input[name="Presence"]');
        
        // 2. Sélection du choix d'accompagnement et du 2ème invité
        const radioSingle = document.getElementById('guest-single');
        const radioCouple = document.getElementById('guest-couple');
        const secondGuestGroup = document.getElementById('second-guest-group');
        const secondGuestInput = document.getElementById('second-guest-name');
        const numberOfGuestsGroup = document.getElementById('number-of-guests-group');

        // 3. Sélection des autres champs à masquer/afficher
        // Pour que cela fonctionne, nous allons cibler les parents directs (.form-group) de ces éléments
        const childrenGroup = document.getElementById('children-count').closest('.form-group');
        const stepsGroup = document.querySelector('.checkboxes-presence');
        const emailGroup = document.getElementById('guest-email').closest('.form-group');

        // Fonction pour gérer l'apparition du 2ème invité (quand on est présent)
        function toggleSecondGuest() {
            const isComing = document.querySelector('input[name="Presence"]:checked').value === 'Oui';
            
            if (radioCouple && radioCouple.checked && isComing) {
                secondGuestGroup.style.display = 'block';
                if (secondGuestInput) secondGuestInput.setAttribute('required', 'required');
            } else {
                secondGuestGroup.style.display = 'none';
                if (secondGuestInput) {
                    secondGuestInput.removeAttribute('required');
                    secondGuestInput.value = ''; // On vide pour éviter d'envoyer une valeur résiduelle
                }
            }
        }

        // Fonction globale qui affiche ou cache les blocs selon la présence (Oui/Non)
        function handlePresenceChange() {
            const isComing = document.querySelector('input[name="Presence"]:checked').value === 'Oui';

            if (isComing) {
                // S'IL VIENT : On réaffiche tout le formulaire
                if (numberOfGuestsGroup) numberOfGuestsGroup.style.display = 'block';
                if (childrenGroup) childrenGroup.style.display = 'block';
                if (stepsGroup) stepsGroup.style.display = 'block';
                if (emailGroup) emailGroup.style.display = 'block';
                
                // On remet l'email en obligatoire
                document.getElementById('guest-email').setAttribute('required', 'required');
                
                // On gère l'affichage dynamique du 2ème invité selon son choix (seul ou à 2)
                toggleSecondGuest();
            } else {
                // S'IL NE VIENT PAS : On masque tout sauf Nom, Présence et Petit Mot
                if (numberOfGuestsGroup) numberOfGuestsGroup.style.display = 'none';
                if (secondGuestGroup) secondGuestGroup.style.display = 'none';
                if (childrenGroup) childrenGroup.style.display = 'none';
                if (stepsGroup) stepsGroup.style.display = 'none';
                if (emailGroup) emailGroup.style.display = 'none';
                
                // On retire la contrainte "obligatoire" de l'e-mail et du 2e invité puisqu'ils sont masqués
                document.getElementById('guest-email').removeAttribute('required');
                if (secondGuestInput) secondGuestInput.removeAttribute('required');
            }
        }

        // Écoute des changements sur les boutons "Seul" ou "À 2"
        if (radioSingle) radioSingle.addEventListener('change', toggleSecondGuest);
        if (radioCouple) radioCouple.addEventListener('change', toggleSecondGuest);

        // Écoute des changements sur le choix Oui/Non de présence
        presenceRadios.forEach(radio => {
            radio.addEventListener('change', handlePresenceChange);
        });

        // Lancement initial au chargement du formulaire
        handlePresenceChange();
    });
</script>
            </div>
        </div>
    </main>

    <!-- Pied de page -->

    <script>
        // --- PARTIE 1 : Gérer l'arrivée douce (Fade In) ---
        // Dès que le contenu HTML est chargé, on active la transition
        window.addEventListener('DOMContentLoaded', () => {
            // Un très léger délai (50ms) assure que le navigateur a bien appliqué opacity: 0 initialement
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 50);
        });

        // --- PARTIE 2 : Gérer le départ doux (Fade Out) ---
        // On écoute tous les clics sur la page
        document.addEventListener('click', (e) => {
            // On cherche si l'élément cliqué est un lien <a> ou est à l'intérieur d'un lien <a>
            const link = e.target.closest('a');

            // Si ce n'est pas un lien, ou s'il n'a pas d'URL, on ne fait rien
            if (!link || !link.href) return;

            // Configuration pour valider que c'est un lien interne vers notre site (.html)
            const isInternal = link.hostname === window.location.hostname;
            const isHtmlPage = link.pathname.endsWith('.html') || link.pathname === '/'; // Gère aussi la racine '/'
            const isNotSamePage = link.hash === ''; // Ignore les liens d'ancrage (#section)

            if (isInternal && isHtmlPage && isNotSamePage) {
                e.preventDefault(); // On bloque la redirection immédiate
                const targetUrl = link.href;

                // On ajoute la classe qui fait disparaître la page
                document.body.classList.add('fade-out');

                // On attend la fin de l'animation de sortie (coordonnée avec le CSS : 0.5s)
                setTimeout(() => {
                    window.location.href = targetUrl; // Redirection vers la nouvelle page
                }, 500); // 500ms = 0.5s
            }
        });
    </script>
</body>

</html>
